---
layout: default
---

{% include header.html %}

<div class="content post">
  <h1 class="post-title">{{ page.title }}</h1>
  <div class="post-date">
    <time>{{ page.date | date_to_string }}</time>
  </div>
  {{ content }}
</div>
  
{% include _share-pages.html %}
<div class="share">
    Share this post &rarr;
    <a href="https://twitter.com/intent/tweet?text={{ page.title }}&url={{ site.url1 }}{{ page.url }}&via={{ site.twitter_username }}&related={{ site.twitter_username }}" rel="nofollow" target="_blank" title="Share on Twitter"><i class="fa fa-twitter-square" aria-hidden="true"></i></a>
    <a href="https://facebook.com/sharer.php?u={{ site.url1 }}{{ page.url }}" rel="nofollow" target="_blank" title="Share on Facebook"><i class="fa fa-facebook-square" aria-hidden="true"></i></a>
    <a href="https://plus.google.com/share?url={{ site.url1 }}{{ page.url }}" rel="nofollow" target="_blank" title="Share on Google+"><i class="fa fa-google-plus-square" aria-hidden="true"></i></a>
    <a href="http://www.linkedin.com/shareArticle?mini=true&url={{ site.url1 }}{{ page.url }}&{{ page.title }}&{{}}&{{}}" rel="nofollow" target="_blank" title="Share on Linked in"><i class="fa fa-linkedin-square" aria-hidden="true"></i></a>
</div>
